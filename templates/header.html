{% load static %}
<!-- ═══════════════════════════════════════
     NAVBAR ELEGANTE
═══════════════════════════════════════ -->
<nav class="navbar navbar-expand-lg eb-navbar" id="mainNavbar">
    <div class="container">

        <!-- Logo / Marca -->
        <a class="navbar-brand eb-brand" href="{% url 'inicio' %}">
            <span class="eb-brand-script">Eventos</span>
            <span class="eb-brand-serif">BELGRANO</span>
        </a>

        <!-- Toggler mobile -->
        <button class="navbar-toggler eb-toggler" type="button"
                data-bs-toggle="collapse" data-bs-target="#navbarMenu"
                aria-controls="navbarMenu" aria-expanded="false"
                aria-label="Abrir menú">
            <i class="bi bi-list"></i>
        </button>

        <!-- Links de navegación -->
        <div class="collapse navbar-collapse" id="navbarMenu">
            <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-1">

                <li class="nav-item">
                    <a class="nav-link eb-nav-link {% if pagina_activa == 'inicio' %}active{% endif %}"
                       href="{% url 'inicio' %}">Inicio</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link eb-nav-link {% if pagina_activa == 'servicios' %}active{% endif %}"
                       href="{% url 'servicios' %}">Servicios</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link eb-nav-link {% if pagina_activa == 'galeria' %}active{% endif %}"
                       href="{% url 'galeria' %}">Galería</a>
                </li>

                <li class="nav-item ms-lg-3">
                    <a class="eb-btn-nav {% if pagina_activa == 'contacto' %}active{% endif %}"
                       href="{% url 'contacto' %}">Reservar</a>
                </li>

            </ul>
        </div>

    </div>
</nav>

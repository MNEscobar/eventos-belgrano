{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow-sm border-0">
                <div class="card-header bg-white border-bottom-0 pt-4 pb-0 text-center">
                    <h3 class="fw-bold text-primary">Iniciar Sesión</h3>
                    <p class="text-muted small">Acceda al Panel de Control de Eventos Belgrano.</p>
                </div>
                <div class="card-body p-4">
                    <form method="POST" action="{% url 'authentication:login' %}">
                        {% csrf_token %}
                        
                        <div class="mb-3">
                            <label for="id_username" class="form-label fw-semibold">Correo Electrónico</label>
                            <input type="text" name="username" class="form-control" placeholder="su@email.com" required id="id_username">
                        </div>
                        <div class="mb-4">
                            <label for="id_password" class="form-label fw-semibold">Contraseña</label>
                            <input type="password" name="password" class="form-control" placeholder="••••••••" required id="id_password">
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary btn-lg">Ingresar al Panel</button>
                        </div>
                    </form>
                </div>
                <div class="card-footer bg-light border-top-0 py-3 text-center">
                    <small class="text-muted">¿Tiene un código de invitación? <a href="{% url 'authentication:validar' %}" class="text-decoration-none fw-semibold">Validar aquí</a></small>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

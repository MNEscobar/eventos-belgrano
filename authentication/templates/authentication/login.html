{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Eventos Belgrano</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="{% static 'authentication/css/auth_style.css' %}">
</head>
<body>

    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-header">
                <div class="mb-3">
                    <i class="bi bi-shield-lock-fill text-primary" style="font-size: 2.5rem;"></i>
                </div>
                <h3 class="fw-bold text-dark mb-1">Iniciar Sesión</h3>
                <p class="text-muted small mb-0">Panel de Control - Eventos Belgrano</p>
            </div>

            <div class="auth-body">
                
                {% if messages %}
                    {% for message in messages %}
                        <div class="alert alert-danger alert-dismissible fade show py-2" role="alert" style="font-size: 0.85rem;">
                            <i class="bi bi-exclamation-triangle-fill me-1"></i> {{ message }}
                            <button type="button" class="btn-close btn-sm" data-bs-dismiss="alert" aria-label="Close"></button>
                        </div>
                    {% endfor %}
                {% endif %}

                <form method="POST" action="{% url 'authentication:login' %}">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label for="id_username" class="form-label text-muted small fw-bold text-uppercase" style="letter-spacing: 0.5px;">Correo Electrónico</label>
                        <div class="input-group">
                            <span class="input-group-text border-end-0"><i class="bi bi-envelope text-muted"></i></span>
                            <input type="text" name="username" class="form-control border-start-0" placeholder="su@email.com" required id="id_username">
                        </div>
                    </div>

                    <div class="mb-4">
                        <label for="id_password" class="form-label text-muted small fw-bold text-uppercase" style="letter-spacing: 0.5px;">Contraseña</label>
                        <div class="input-group">
                            <span class="input-group-text border-end-0"><i class="bi bi-key text-muted"></i></span>
                            <input type="password" name="password" class="form-control border-start-0" placeholder="••••••••" required id="id_password">
                        </div>
                    </div>

                    <div class="d-grid mt-4">
                        <button type="submit" class="btn btn-primary btn-auth shadow-sm">Ingresar al Panel</button>
                    </div>
                </form>
            </div>

            <div class="auth-footer">
                <small class="text-muted">¿Tiene un código de invitación?<br>
                    <a href="{% url 'authentication:validar' %}" class="text-primary text-decoration-none fw-semibold">Validar código aquí</a>
                </small>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
